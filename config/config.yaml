server:
  host: "10.113.248.164"  # 修改为0.0.0.0以允许外部访问
  port: 8080
  upload_limit: 100 # MB
  evn: "build"

file_storage:
  path: "uploads"
  temp_file_expire: 1800  # 30分钟
  max_file_size: 104857600  # 100MB
  cleanup_interval: 3600  # 1小时清理一次

python:
  env_path: "/app/venv/bin/python"  # 使用容器中虚拟环境的Python路径
  scripts_dir: "scripts/pdf"  # 指向您的PDF处理脚本目录（暂不使用）
  venv_dir: ".venv"  # 虚拟环境目录
  requirements_file: "scripts/requirements.txt"  # Python依赖配置文件

redis:
  host: "10.113.248.164"  # 使用Docker特殊DNS名称连接宿主机
  port: 6379
  password: ""  # 如果有密码就填写
  db: 0
  pool_size: 10
  min_idle_conns: 5
  max_retries: 3
  timeout: 5  # 秒

log:
  level: "info"
  file: "logs/app.log"
  max_size: 100    # MB
  max_backups: 3
  max_age: 28      # 天

task_manager:
  workers_per_processor: 5
  queue_size: 100
  task_timeout: 1800  # 30分钟，单位秒
  cleanup_interval: 3600  # 1小时，单位秒

mongodb:
  uri: "mongodb://convert:Convert%402025@10.113.248.164:27017/convertdb?authSource=admin"  # 账号convert,密码Convert@2025,认证库admin
  minPoolSize: 10
  maxPoolSize: 500
  maxConnIdleTime: 30 # 单位：秒

SSL:
  CertFile: "config/fullchain.pem"
  KeyFile: "config/tools.guyaai.com.key"